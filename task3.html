<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe </title>
    <style>
    body{
    font-family: Arial, sans-serif;
    background-color: lightblue;
    text-align: center;
    margin-top: 50px;
}

h1{
    color: darkblue;
}

#board{
    display: grid;
    grid-template-columns: repeat(3,100px);
    gap: 10px;
    justify-content: center;
    margin: 30px auto;
}

#board button{
    width: 100px;
    height: 100px;
    font-size: 40px;
    cursor: pointer;
}

button{
    padding: 10px 20px;
    font-size: 18px;
}
</style>
</head>
<body>
    <h1>Tic Tac Toe</h1>

<div id="board">

    <button></button>
    <button></button>
    <button></button>

    <button></button>
    <button></button>
    <button></button>

    <button></button>
    <button></button>
    <button></button>

</div>

<button onclick="restartGame()">Restart Game</button>
<script>
    let buttons = document.querySelectorAll("#board button");
    let currentPlayer = "X";
    let gameOver = false;
    function checkWinner(){

    const winPatterns = [

        [0,1,2],
        [3,4,5],
        [6,7,8],

        [0,3,6],
        [1,4,7],
        [2,5,8],

        [0,4,8],
        [2,4,6]

    ];

    for(let pattern of winPatterns){

        let a = buttons[pattern[0]].textContent;
        let b = buttons[pattern[1]].textContent;
        let c = buttons[pattern[2]].textContent;

        if(a != "" && a == b && b == c){

            alert(a + " Wins!");

            gameOver = true;
            return;
        }
    }
}
    buttons.forEach(function(button){

    button.addEventListener("click", function(){

        if(gameOver){
            return;
        }

        if(button.innerText == ""){

            button.innerText = currentPlayer;

            checkWinner();

            if(currentPlayer == "X"){
                currentPlayer = "O";
            }
            else{
                currentPlayer = "X";
            }
                let gameOver = false;

        }

    });

});
function restartGame(){

    buttons.forEach(function(button){
        button.textContent = "";
    });

    currentPlayer = "X";
    gameOver = false;
}
</script>
</body>
</html>
