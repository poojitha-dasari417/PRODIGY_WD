<!DOCTYPE html>
<html>

<head>
    <title>Stopwatch</title>

    <style>
        body{
            font-family:Arial, sans-serif;
            background-color:lightblue;
            text-align:center;
            margin-top:100px;
        }

        h1{
            color:darkblue;
            font-size:50px;
        }

        #display{
            font-size:60px;
            margin:30px;
        }

        button{
            padding:12px 20px;
            font-size:20px;
            margin:10px;
            cursor:pointer;
            border:none;
            border-radius:8px;
            background-color:#007BFF;
            color:white;
            transition:0.3s;
        }
        button:hover{
    background-color:#031529;
    transform:scale(1.05);
}

#display{
    font-size:60px;
    margin:30px;
    color:darkblue;
    font-weight:bold;
}
    </style>

</head>

<body>

    <h1>Stopwatch</h1>

    <h2 id="display">00:00:00</h2>

    <button onclick="startStopwatch()">Start</button>
    <button onclick="pauseStopwatch()">Pause</button>
    <button onclick="resetStopwatch()">Reset</button>
<script>

let seconds = 0;
let minutes = 0;
let hours = 0;

let timer = null;
function updateDisplay() {

    let h = String(hours).padStart(2, "0");
    let m = String(minutes).padStart(2, "0");
    let s = String(seconds).padStart(2, "0");

    document.getElementById("display").innerText = h + ":" + m + ":" + s;
}
function runStopwatch() {
    
    seconds++;

    if(seconds == 60){
        seconds = 0;
        minutes++;
    }

    if(minutes == 60){
        minutes = 0;
        hours++;
    }

    updateDisplay();
}
    function startStopwatch(){

    if(timer !== null){
        clearInterval(timer);
    }

    timer = setInterval(runStopwatch,1000);

}
function pauseStopwatch(){
    clearInterval(timer);

}
function resetStopwatch(){
    clearInterval(timer);
    seconds = 0;
    minutes = 0;
    hours = 0;

    updateDisplay();
}

</script>

</body>

</html>
